# Curated public Telegram source candidates for Praveen Signal OS.
#
# Validation policy:
# - No placeholder handles.
# - Every handle below resolved to a public Telegram page or public Telegram contact page during web validation.
# - This is a starter pack, not your private runtime config. Copy selected entries to local sources.yaml.
# - Keep sources.yaml private; it is intentionally gitignored.
#
# Quality note:
# Telegram has many clones, scam channels and stale channels. Start with 10-20 enabled sources,
# run `python -m app.main stats`, then disable noisy sources.

sources:
  # -----------------------------
  # AI / Telegram platform / bots
  # -----------------------------
  - name: Telegram News
    handle: "@telegram"
    enabled: true
    trust_score: 9
    category_hint: AI Engineering
    min_save_score: 7.0
    destination: ai_engineering
    notes: "Official Telegram channel. Useful for bot, platform, privacy and AI feature updates. Validated via public t.me preview."

  - name: Telegram Tips
    handle: "@telegramtips"
    enabled: true
    trust_score: 9
